<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Amazon Page/assets/css/reset.css" />
    <link rel="stylesheet" href="/Amazon Page/assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <title>Amazon Page Mockup</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="/Amazon Page/assets/images/logo.png" alt="amazon-logo" />
      </div>
      <div class="nav-bar">
        <a class="white-anchors" href="#">All</a>
        <a class="white-anchors" href="#">Today's deals</a>
        <a class="white-anchors" href="#">Customer Service</a>
        <a class="white-anchors" href="#">Registry</a>
        <a class="white-anchors" href="#">GiftCards</a>
        <a class="white-anchors" href="#">Sell </a>
      </div>
    </header>
    <main>
      <div class="bg-orange">
        <a href="#" class="white-anchors">Shop All Holiday Gift Cards</a>
      </div>
      <div class="bg-holiday">
        <h1>Holiday Gift Guides</h1>
        <p>Be a go-gifter</p>
      </div>
      <section class="gifts">
        <p>Find the perfect gift <a href="#">Shop now</a></p>
        <div class="img-container">
          <img src="/Amazon Page/assets/images/img_1.jpg" alt="tablet" />
        </div>
        <div class="img-container">
          <img src="/Amazon Page/assets/images/img_2.jpg" alt="laptop" />
        </div>
        <div class="img-container">
          <img src="/Amazon Page/assets/images/img_3.jpg" alt="watches" />
        </div>
        <div class="img-container">
          <img src="/Amazon Page/assets/images/img_4.jpg" alt="pets" />
        </div>
      </section>
      <div class="big-img-container">
        <img src="/Amazon Page/assets/images/img_9.png" alt="tech" />
        <p>Play the gifting game <a href="#">Shop gaming</a></p>
      </div>
      <div class="big-img-container">
        <img src="/Amazon Page/assets/images/img_10.png" alt="sound" />
        <p>The sound of cheer <a href="#">Shop audio and accessories</a></p>
      </div>
    </main>
    <footer>
      <div class="footer-nav">
        <a class="footer-anchor" href="#">Back to top</a>
      </div>
      <div class="footer-logo">
        <img src="/Amazon Page/assets/images/logo.png" alt="amazon-logo" />
      </div>
    </footer>
  </body>
</html>
